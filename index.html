<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QuestList">
<meta name="theme-color" content="#080810">
<title>QuestList</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080810; --surface:#111120; --surface2:#181828; --surface3:#1e1e32;
  --border:rgba(120,130,255,0.12); --border2:rgba(120,130,255,0.22);
  --accent:#6272ff; --accent2:#b060ff; --gold:#ffcf5c;
  --green:#00e5a0; --red:#ff4d6d; --orange:#ff8c42;
  --text:#eaeeff; --muted:#5a607a; --muted2:#8890aa;
  --glow:rgba(98,114,255,0.25);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100dvh;overflow-x:hidden;padding-bottom:calc(76px + var(--safe-bottom));}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(98,114,255,0.07) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 85% 90%,rgba(176,96,255,0.06) 0%,transparent 55%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;}
.screen{display:none;}.screen.active{display:block;}

/* HEADER */
.header{padding:calc(var(--safe-top) + 18px) 18px 0;display:flex;align-items:center;justify-content:space-between;}
.app-wordmark{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--accent);}
.header-actions{display:flex;gap:8px;}
.icon-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:background 0.2s;}
.icon-btn:active{background:var(--surface2);}

/* RANK CARD */
.rank-card{margin:14px 14px 0;background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:18px;position:relative;overflow:hidden;}
.rank-card::after{content:'';position:absolute;top:-50px;right:-50px;width:150px;height:150px;background:radial-gradient(circle,var(--glow) 0%,transparent 65%);pointer-events:none;}
.rank-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.rank-badge{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 18px rgba(98,114,255,0.4);flex-shrink:0;}
.rank-badge.pop{animation:badgePop 0.55s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes badgePop{0%{transform:scale(1)}50%{transform:scale(1.35) rotate(-6deg)}100%{transform:scale(1)}}
.rank-info{flex:1;min-width:0;}
.rank-name{font-family:'Rajdhani',sans-serif;font-size:21px;font-weight:700;line-height:1;margin-bottom:2px;}
.rank-tier{font-size:11px;color:var(--muted);letter-spacing:1.5px;}
.xp-nums{text-align:right;}
.xp-cur{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);line-height:1;}
.xp-max{font-size:10px;color:var(--muted);}
.bar-wrap{height:9px;background:rgba(255,255,255,0.05);border-radius:99px;overflow:hidden;position:relative;}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.9s cubic-bezier(0.34,1.2,0.64,1);box-shadow:0 0 10px rgba(98,114,255,0.5);position:relative;}
.bar-fill::after{content:'';position:absolute;top:1px;left:8%;right:8%;height:3px;background:rgba(255,255,255,0.25);border-radius:99px;}
.bar-shine{position:absolute;top:0;left:-60%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);animation:shine 2.2s ease infinite;}
@keyframes shine{0%{left:-60%}100%{left:110%}}

/* STATS */
.stats-row{display:flex;gap:8px;margin:10px 14px 0;}
.stat-pill{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:11px 8px;text-align:center;}
.stat-v{font-family:'Rajdhani',sans-serif;font-size:21px;font-weight:700;line-height:1;}
.stat-v.c{color:var(--green);}.stat-v.s{color:var(--red);}.stat-v.x{color:var(--accent);}
.stat-l{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

/* ADD PANEL */
.add-panel{margin:12px 14px 0;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:14px;display:flex;flex-direction:column;gap:10px;}
.add-row1{display:flex;gap:8px;}
.task-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.task-input::placeholder{color:var(--muted);}
.task-input:focus{border-color:rgba(98,114,255,0.5);box-shadow:0 0 0 3px rgba(98,114,255,0.08);}
.add-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;width:46px;font-size:22px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(98,114,255,0.35);transition:transform 0.15s;flex-shrink:0;}
.add-btn:active{transform:scale(0.92);}
.add-row2{display:flex;gap:8px;}
.sel{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 8px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:12px;outline:none;cursor:pointer;-webkit-appearance:none;}
.sel.gold{color:var(--gold);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;}
.time-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 10px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:12px;outline:none;-webkit-appearance:none;}
.time-input:focus{border-color:rgba(98,114,255,0.5);}
.time-input::-webkit-calendar-picker-indicator{filter:invert(0.6);}

/* GROUP CHIPS */
.groups-bar{display:flex;gap:6px;padding:12px 14px 0;overflow-x:auto;scrollbar-width:none;}
.groups-bar::-webkit-scrollbar{display:none;}
.group-chip{background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:6px 14px;font-size:12px;font-weight:500;color:var(--muted2);cursor:pointer;white-space:nowrap;transition:all 0.2s;display:flex;align-items:center;gap:5px;}
.group-chip.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 2px 10px rgba(98,114,255,0.3);}
.chip-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:0.7;}

/* FILTER TABS */
.filter-tabs{display:flex;gap:6px;padding:12px 14px 0;}
.ftab{background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:6px 14px;font-size:12px;font-weight:500;color:var(--muted2);cursor:pointer;transition:all 0.2s;}
.ftab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;}

/* SECTION */
.section-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 6px;}
.section-label{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.section-count{font-family:'Rajdhani',sans-serif;font-size:11px;color:var(--muted);}

/* TASK LIST */
.task-list{padding:0 14px;display:flex;flex-direction:column;gap:7px;}
.task-item{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:13px 13px 13px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:opacity 0.25s,border-color 0.25s,transform 0.15s;animation:slideIn 0.3s cubic-bezier(0.34,1.2,0.64,1);position:relative;overflow:hidden;}
@keyframes slideIn{from{opacity:0;transform:translateY(8px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.task-item:active{transform:scale(0.985);}
.task-item.overdue{border-color:rgba(255,77,109,0.4);background:rgba(255,77,109,0.04);}
.task-item.due-soon{border-color:rgba(255,140,66,0.4);background:rgba(255,140,66,0.04);}
.task-item.done-item{opacity:0.45;}
.task-item.done-item .task-text{text-decoration:line-through;color:var(--muted);}
.task-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--pc,transparent);}
.check-ring{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.25s;}
.task-item.done-item .check-ring{background:var(--green);border-color:var(--green);}
.ck{opacity:0;color:#000;font-size:12px;font-weight:700;transition:opacity 0.2s;}
.task-item.done-item .ck{opacity:1;}
.task-body{flex:1;min-width:0;}
.task-text{font-size:15px;font-weight:500;line-height:1.3;word-break:break-word;}
.task-meta{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-top:4px;}
.xp-chip{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--gold);background:rgba(255,207,92,0.1);padding:1px 7px;border-radius:99px;border:1px solid rgba(255,207,92,0.2);}
.group-tag{font-size:10px;padding:1px 7px;border-radius:99px;border:1px solid;}
.timer-tag{font-size:10px;font-weight:600;padding:1px 7px;border-radius:99px;display:flex;align-items:center;gap:3px;}
.timer-tag.ok{color:var(--muted2);background:var(--surface2);border:1px solid var(--border);}
.timer-tag.soon{color:var(--orange);background:rgba(255,140,66,0.1);border:1px solid rgba(255,140,66,0.25);}
.timer-tag.late{color:var(--red);background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.25);animation:pulse 1.2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.task-act-btn{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:5px;border-radius:8px;transition:color 0.2s,background 0.2s;line-height:1;}
.task-act-btn:active{background:rgba(255,77,109,0.12);color:var(--red);}

/* OVERDUE BANNER */
.overdue-banner{margin:10px 14px 0;background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.3);border-radius:14px;padding:10px 14px;display:none;align-items:center;gap:10px;}
.overdue-banner.show{display:flex;}
.ob-text{flex:1;font-size:13px;color:var(--red);font-weight:500;}

/* EMPTY */
.empty{text-align:center;padding:44px 24px;}
.empty-icon{font-size:44px;opacity:0.35;margin-bottom:10px;}
.empty-title{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:600;opacity:0.3;}
.empty-sub{font-size:12px;color:var(--muted);margin-top:4px;}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.overlay.show{opacity:1;pointer-events:all;}
.modal{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:24px 24px 0 0;border-top:1px solid var(--border2);padding:20px 18px calc(var(--safe-bottom) + 20px);z-index:300;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.34,1.1,0.64,1);max-height:85dvh;overflow-y:auto;}
.modal.show{transform:translateY(0);}
.modal-handle{width:36px;height:4px;border-radius:99px;background:var(--muted);margin:0 auto 18px;opacity:0.4;}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;margin-bottom:14px;}
.modal-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:15px;outline:none;margin-bottom:10px;}
.modal-input:focus{border-color:rgba(98,114,255,0.5);}
.modal-btn{width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;transition:transform 0.15s;margin-bottom:8px;}
.modal-btn:active{transform:scale(0.97);}
.modal-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 16px rgba(98,114,255,0.35);}
.modal-btn.ghost{background:var(--surface2);color:var(--muted2);border:1px solid var(--border);}
.color-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.2s,border-color 0.2s;}
.color-swatch.selected{border-color:#fff;transform:scale(1.15);}
.groups-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.group-row{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;}
.group-row-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.group-row-name{flex:1;font-size:14px;font-weight:500;}
.group-row-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 6px;}
.group-row-del:active{color:var(--red);}

/* SHARE */
.share-card{background:linear-gradient(135deg,var(--surface2),var(--surface3));border:1px solid var(--border2);border-radius:18px;padding:18px;margin-bottom:14px;text-align:center;}
.share-rank-icon{font-size:36px;margin-bottom:6px;}
.share-username{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;}
.share-stats{font-size:13px;color:var(--muted2);margin-top:4px;}
.share-url{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--muted2);word-break:break-all;margin-bottom:10px;font-family:monospace;}

/* XP POP */
.xp-pop{position:fixed;z-index:999;pointer-events:none;font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--gold);text-shadow:0 0 20px rgba(255,207,92,0.6);animation:xpFly 1.2s ease forwards;}
@keyframes xpFly{0%{opacity:0;transform:translateY(0) scale(0.7)}20%{opacity:1;transform:translateY(-12px) scale(1.1)}80%{opacity:1;transform:translateY(-55px) scale(1)}100%{opacity:0;transform:translateY(-85px) scale(0.9)}}

/* LEVEL UP */
.lvl-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.7);background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:24px;padding:28px 40px;text-align:center;z-index:400;opacity:0;pointer-events:none;transition:all 0.4s cubic-bezier(0.34,1.4,0.64,1);box-shadow:0 20px 60px rgba(98,114,255,0.5);}
.lvl-banner.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.lvl-icon{font-size:46px;margin-bottom:6px;}
.lvl-label{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:4px;opacity:0.8;}
.lvl-name{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;}

/* RANKS SCREEN */
.ranks-header{padding:calc(var(--safe-top) + 18px) 14px 0;text-align:center;}
.ranks-title{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
.rank-ladder{padding:0 14px;display:flex;flex-direction:column;gap:7px;}
.rank-row{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:13px 15px;display:flex;align-items:center;gap:12px;transition:border-color 0.3s;}
.rank-row.current{border-color:var(--accent);box-shadow:0 0 0 1px rgba(98,114,255,0.15),0 4px 18px rgba(98,114,255,0.1);}
.rank-row.done-rank{opacity:0.5;}
.rr-badge{font-size:26px;width:38px;text-align:center;}
.rr-info{flex:1;}
.rr-name{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:600;}
.rr-xp{font-size:11px;color:var(--muted);}
.you-tag{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,var(--accent),var(--accent2));padding:3px 10px;border-radius:99px;color:#fff;}

/* SETUP */
.setup-screen{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:30px;}
.setup-card{background:var(--surface);border:1px solid var(--border2);border-radius:24px;padding:30px 24px;width:100%;max-width:340px;text-align:center;}
.setup-icon{font-size:52px;margin-bottom:14px;}
.setup-title{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;margin-bottom:6px;}
.setup-sub{font-size:13px;color:var(--muted2);margin-bottom:20px;line-height:1.5;}
</style>
</head>
<body>

<!-- SETUP -->
<div class="setup-screen" id="setupScreen" style="display:none">
  <div class="setup-card">
    <div class="setup-icon">⚔️</div>
    <div class="setup-title">Welcome to QuestList</div>
    <div class="setup-sub">Set your adventurer name to get started. This will appear on your shareable profile.</div>
    <input class="modal-input" id="setupInput" placeholder="Your name (e.g. Kudos13)" maxlength="20" style="text-align:center;margin-bottom:14px">
    <button class="modal-btn primary" onclick="setupUser()">Begin Quest</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeAllModals()"></div>

<div class="lvl-banner" id="lvlBanner">
  <div class="lvl-icon" id="lvlIcon">⚔️</div>
  <div class="lvl-label">Rank Up!</div>
  <div class="lvl-name" id="lvlName">—</div>
</div>

<!-- GROUP MODAL -->
<div class="modal" id="groupModal">
  <div class="modal-handle"></div>
  <div class="modal-title">Manage Groups</div>
  <div class="groups-list" id="groupsList"></div>
  <input class="modal-input" id="groupNameInput" placeholder="New group name…" maxlength="24">
  <div class="color-row" id="colorRow"></div>
  <button class="modal-btn primary" onclick="addGroup()">Add Group</button>
  <button class="modal-btn ghost" onclick="closeAllModals()">Done</button>
</div>

<!-- SHARE MODAL -->
<div class="modal" id="shareModal">
  <div class="modal-handle"></div>
  <div class="modal-title">Share Your Progress</div>
  <div class="share-card">
    <div class="share-rank-icon" id="shareRankIcon">🥉</div>
    <div class="share-username" id="shareUsername">—</div>
    <div class="share-stats" id="shareStats">—</div>
  </div>
  <div class="share-url" id="shareUrl"></div>
  <button class="modal-btn primary" id="copyBtn" onclick="copyShareLink()">📋 Copy Share Link</button>
  <button class="modal-btn ghost" onclick="closeAllModals()">Close</button>
</div>

<div class="app">

  <!-- QUESTS SCREEN -->
  <div class="screen active" id="screenQuests">
    <div class="header">
      <div class="app-wordmark">⚡ QuestList</div>
      <div class="header-actions">
        <button class="icon-btn" onclick="openGroupModal()">🗂</button>
        <button class="icon-btn" onclick="openShareModal()">📤</button>
      </div>
    </div>

    <div class="rank-card">
      <div class="rank-top">
        <div class="rank-badge" id="rankBadge">🥉</div>
        <div class="rank-info">
          <div class="rank-name" id="rankName">Bronze Squire</div>
          <div class="rank-tier" id="rankTier">RANK I</div>
        </div>
        <div class="xp-nums">
          <div class="xp-cur"><span id="xpVal">0</span> XP</div>
          <div class="xp-max">/ <span id="xpNext">150</span></div>
        </div>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill" id="xpBar" style="width:0%"><div class="bar-shine"></div></div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-pill"><div class="stat-v c" id="sDone">0</div><div class="stat-l">Done</div></div>
      <div class="stat-pill"><div class="stat-v s" id="sStreak">🔥0</div><div class="stat-l">Streak</div></div>
      <div class="stat-pill"><div class="stat-v x" id="sXP">0</div><div class="stat-l">Total XP</div></div>
    </div>

    <div class="overdue-banner" id="overdueBanner">
      <span>⚠️</span>
      <div class="ob-text" id="overdueText">You have overdue quests!</div>
    </div>

    <div class="add-panel">
      <div class="add-row1">
        <input class="task-input" id="taskInput" placeholder="Add a new quest…" maxlength="80">
        <button class="add-btn" id="addBtn">+</button>
      </div>
      <div class="add-row2">
        <select class="sel gold" id="xpSel">
          <option value="25">⚡ 25 XP</option>
          <option value="50" selected>⭐ 50 XP</option>
          <option value="100">💎 100 XP</option>
          <option value="200">🏆 200 XP</option>
        </select>
        <select class="sel" id="groupSel">
          <option value="">No group</option>
        </select>
        <input class="time-input" type="datetime-local" id="dueInput" title="Set due date">
      </div>
    </div>

    <div class="filter-tabs">
      <button class="ftab active" data-f="active" onclick="setFilter('active',this)">Active</button>
      <button class="ftab" data-f="all" onclick="setFilter('all',this)">All</button>
      <button class="ftab" data-f="done" onclick="setFilter('done',this)">Done</button>
    </div>

    <div class="groups-bar" id="groupsBar"></div>

    <div class="section-hd">
      <div class="section-label" id="sectionLabel">ACTIVE QUESTS</div>
      <div class="section-count" id="sectionCount"></div>
    </div>
    <div class="task-list" id="taskList"></div>
    <div style="height:10px"></div>
  </div>

  <!-- RANKS SCREEN -->
  <div class="screen" id="screenRanks">
    <div class="ranks-header">
      <div class="ranks-title">🏆 Rank Ladder</div>
    </div>
    <div class="rank-ladder" id="rankLadder"></div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="navQ" onclick="showScreen('quests')">
    <span class="nav-icon">⚔️</span>Quests
  </button>
  <button class="nav-btn" id="navR" onclick="showScreen('ranks')">
    <span class="nav-icon">🏆</span>Ranks
  </button>
</nav>

<script>
const RANKS=[
  {name:"Bronze Squire",icon:"🥉",xp:0,tier:"RANK I"},
  {name:"Iron Warrior",icon:"⚔️",xp:150,tier:"RANK II"},
  {name:"Silver Knight",icon:"🛡️",xp:400,tier:"RANK III"},
  {name:"Gold Guardian",icon:"🥇",xp:800,tier:"RANK IV"},
  {name:"Platinum Paladin",icon:"💫",xp:1500,tier:"RANK V"},
  {name:"Diamond Legend",icon:"💎",xp:2500,tier:"RANK VI"},
  {name:"Mythic Champion",icon:"🔥",xp:4000,tier:"RANK VII"},
  {name:"Eternal Sovereign",icon:"👑",xp:6000,tier:"RANK VIII"},
];

const COLORS=["#6272ff","#b060ff","#00e5a0","#ff4d6d","#ff8c42","#ffcf5c","#00c8ff","#ff6eb4"];
let selColor=COLORS[0];

function rIdx(xp){let i=RANKS.length-1;while(i>0&&xp<RANKS[i].xp)i--;return i;}

let S=JSON.parse(localStorage.getItem('ql3')||'null')||{
  tasks:[],groups:[],xp:0,totalXP:0,streak:0,done:0,
  lastDate:null,filter:'active',gFilter:'all',username:''
};
function save(){localStorage.setItem('ql3',JSON.stringify(S));}

window.addEventListener('load',()=>{
  if(!S.username){document.getElementById('setupScreen').style.display='flex';}
  else{init();}
});

function setupUser(){
  const n=document.getElementById('setupInput').value.trim();
  if(!n)return;
  S.username=n;save();
  document.getElementById('setupScreen').style.display='none';
  init();
}

function init(){
  buildColorSwatches();
  render();
  setInterval(()=>{renderTasks();checkOverdue();},30000);
}

// ── RENDER ──
function render(){
  const ri=rIdx(S.xp),rank=RANKS[ri],next=RANKS[ri+1];
  const pct=next?Math.round(((S.xp-rank.xp)/(next.xp-rank.xp))*100):100;
  document.getElementById('rankBadge').textContent=rank.icon;
  document.getElementById('rankName').textContent=rank.name;
  document.getElementById('rankTier').textContent=rank.tier+' · '+S.username;
  document.getElementById('xpVal').textContent=S.xp;
  document.getElementById('xpNext').textContent=next?next.xp:'∞';
  document.getElementById('xpBar').style.width=Math.min(pct,100)+'%';
  document.getElementById('sDone').textContent=S.done;
  document.getElementById('sStreak').textContent='🔥'+S.streak;
  document.getElementById('sXP').textContent=S.totalXP;
  renderGroupChips();
  renderGroupSel();
  renderTasks();
  renderRankLadder();
  checkOverdue();
}

function renderGroupChips(){
  const bar=document.getElementById('groupsBar');
  bar.innerHTML=[
    btn('all','All'),
    btn('none','Ungrouped'),
    ...S.groups.map(g=>`<button class="group-chip ${S.gFilter===g.id?'active':''}" onclick="setGFilter('${g.id}')"><span class="chip-dot" style="background:${g.color}"></span>${x(g.name)}</button>`)
  ].join('');
  function btn(v,label){return `<button class="group-chip ${S.gFilter===v?'active':''}" onclick="setGFilter('${v}')">${label}</button>`;}
}

function renderGroupSel(){
  document.getElementById('groupSel').innerHTML=
    '<option value="">No group</option>'+
    S.groups.map(g=>`<option value="${g.id}">${x(g.name)}</option>`).join('');
}

function renderTasks(){
  const list=document.getElementById('taskList');
  let tasks=[...S.tasks];
  if(S.filter==='active')tasks=tasks.filter(t=>!t.done);
  else if(S.filter==='done')tasks=tasks.filter(t=>t.done);
  if(S.gFilter==='none')tasks=tasks.filter(t=>!t.groupId);
  else if(S.gFilter!=='all')tasks=tasks.filter(t=>t.groupId===S.gFilter);

  tasks.sort((a,b)=>{
    const ao=isOverdue(a),bo=isOverdue(b);
    if(ao&&!bo)return -1;if(!ao&&bo)return 1;
    if(a.due&&b.due)return new Date(a.due)-new Date(b.due);
    if(a.due&&!b.due)return -1;if(!a.due&&b.due)return 1;
    return b.id-a.id;
  });

  const lbl=S.filter==='done'?'COMPLETED QUESTS':S.filter==='active'?'ACTIVE QUESTS':'ALL QUESTS';
  document.getElementById('sectionLabel').textContent=lbl;
  document.getElementById('sectionCount').textContent=tasks.length||'';

  if(!tasks.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">${S.filter==='done'?'🏆':'⚔️'}</div><div class="empty-title">${S.filter==='done'?'No completed quests':'No active quests'}</div><div class="empty-sub">${S.filter==='done'?'Complete quests to see them here':'Add a quest above to begin'}</div></div>`;
    return;
  }

  list.innerHTML=tasks.map(t=>{
    const pc=t.xp>=200?'#b060ff':t.xp>=100?'#ffcf5c':t.xp>=50?'#6272ff':'#5a607a';
    const g=S.groups.find(g=>g.id===t.groupId);
    const oc=!t.done&&isOverdue(t)?'overdue':!t.done&&isDueSoon(t)?'due-soon':'';
    const timerH=t.due&&!t.done?timerTag(t.due):'';
    const groupH=g?`<span class="group-tag" style="color:${g.color};border-color:${g.color}33;background:${g.color}11">${x(g.name)}</span>`:'';
    const doneHint=t.done?'<span style="font-size:10px;color:var(--muted2)">Tap to uncheck</span>':'';
    return `<div class="task-item ${t.done?'done-item':''} ${oc}" style="--pc:${pc}" onclick="toggleTask('${t.id}',event)" data-id="${t.id}">
      <div class="check-ring"><span class="ck">✓</span></div>
      <div class="task-body">
        <div class="task-text">${x(t.text)}</div>
        <div class="task-meta"><span class="xp-chip">+${t.xp} XP</span>${groupH}${timerH}${doneHint}</div>
      </div>
      <button class="task-act-btn" onclick="deleteTask('${t.id}',event)">🗑</button>
    </div>`;
  }).join('');
}

function timerTag(due){
  const diff=new Date(due)-Date.now(),abs=Math.abs(diff);
  const mins=Math.floor(abs/60000),hrs=Math.floor(mins/60),days=Math.floor(hrs/24);
  let label=days>0?`${days}d ${hrs%24}h`:hrs>0?`${hrs}h ${mins%60}m`:`${mins}m`;
  if(diff<0)return `<span class="timer-tag late">⚠️ ${label} overdue</span>`;
  if(diff<3600000)return `<span class="timer-tag soon">⏱ ${label}</span>`;
  return `<span class="timer-tag ok">🕐 ${label}</span>`;
}

function isOverdue(t){return t.due&&!t.done&&new Date(t.due)<Date.now();}
function isDueSoon(t){const d=new Date(t.due)-Date.now();return t.due&&!t.done&&d<3600000&&d>0;}

function checkOverdue(){
  const od=S.tasks.filter(t=>isOverdue(t));
  const b=document.getElementById('overdueBanner');
  if(od.length){b.classList.add('show');document.getElementById('overdueText').textContent=`${od.length} overdue quest${od.length>1?'s'}! Complete ${od.length>1?'them':'it'} to stay on track.`;}
  else b.classList.remove('show');
}

function renderRankLadder(){
  const ri=rIdx(S.xp);
  document.getElementById('rankLadder').innerHTML=RANKS.map((r,i)=>{
    const achieved=S.xp>=r.xp,current=i===ri;
    return `<div class="rank-row ${current?'current':''} ${achieved&&!current?'done-rank':''}">
      <div class="rr-badge">${r.icon}</div>
      <div class="rr-info"><div class="rr-name">${r.name}</div><div class="rr-xp">${r.xp.toLocaleString()} XP</div></div>
      <div>${current?'<span class="you-tag">YOU</span>':achieved?'<span style="color:var(--green);font-size:18px">✓</span>':'<span style="color:var(--muted)">🔒</span>'}</div>
    </div>`;
  }).join('');
}

// ── ACTIONS ──
function addTask(){
  const input=document.getElementById('taskInput');
  const text=input.value.trim();if(!text){input.focus();return;}
  const xp=parseInt(document.getElementById('xpSel').value);
  const groupId=document.getElementById('groupSel').value||null;
  const due=document.getElementById('dueInput').value||null;
  S.tasks.unshift({id:Date.now().toString(),text,xp,done:false,groupId,due});
  input.value='';document.getElementById('dueInput').value='';
  save();render();
}

function toggleTask(id,e){
  if(e.target.closest('.task-act-btn'))return;
  const t=S.tasks.find(t=>t.id===id);if(!t)return;
  if(t.done){
    // UNCHECK — give back XP
    t.done=false;
    S.xp=Math.max(0,S.xp-t.xp);
    S.totalXP=Math.max(0,S.totalXP-t.xp);
    S.done=Math.max(0,S.done-1);
    save();render();return;
  }
  const prevRank=rIdx(S.xp);
  t.done=true;S.xp+=t.xp;S.totalXP+=t.xp;S.done++;
  updateStreak();save();
  const newRank=rIdx(S.xp);
  if(newRank>prevRank)showLevelUp(newRank);
  spawnXP(e,t.xp);render();
}

function deleteTask(id,e){
  e.stopPropagation();
  const t=S.tasks.find(t=>t.id===id);
  if(t&&t.done){S.xp=Math.max(0,S.xp-t.xp);S.totalXP=Math.max(0,S.totalXP-t.xp);S.done=Math.max(0,S.done-1);}
  S.tasks=S.tasks.filter(t=>t.id!==id);
  save();render();
}

function updateStreak(){
  const today=new Date().toDateString();
  if(S.lastDate===today)return;
  const yest=new Date(Date.now()-86400000).toDateString();
  S.streak=S.lastDate===yest?S.streak+1:1;
  S.lastDate=today;
}

function setFilter(f,el){
  S.filter=f;save();render();
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function setGFilter(v){S.gFilter=v;save();render();}

// ── GROUPS ──
function openGroupModal(){
  renderGroupsModal();
  show('groupModal');
}

function renderGroupsModal(){
  const gl=document.getElementById('groupsList');
  if(!S.groups.length){gl.innerHTML='<div style="text-align:center;color:var(--muted);font-size:13px;padding:8px 0">No groups yet — add one below</div>';return;}
  gl.innerHTML=S.groups.map(g=>`<div class="group-row">
    <div class="group-row-dot" style="background:${g.color}"></div>
    <div class="group-row-name">${x(g.name)}</div>
    <button class="group-row-del" onclick="deleteGroup('${g.id}')">✕</button>
  </div>`).join('');
}

function buildColorSwatches(){
  document.getElementById('colorRow').innerHTML=COLORS.map((c,i)=>
    `<div class="color-swatch ${i===0?'selected':''}" style="background:${c}" onclick="pickColor('${c}',this)"></div>`
  ).join('');
}

function pickColor(c,el){
  selColor=c;
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected');
}

function addGroup(){
  const name=document.getElementById('groupNameInput').value.trim();if(!name)return;
  S.groups.push({id:Date.now().toString(),name,color:selColor});
  document.getElementById('groupNameInput').value='';
  save();render();renderGroupsModal();
}

function deleteGroup(id){
  S.groups=S.groups.filter(g=>g.id!==id);
  S.tasks.forEach(t=>{if(t.groupId===id)t.groupId=null;});
  if(S.gFilter===id)S.gFilter='all';
  save();render();renderGroupsModal();
}

// ── SHARE ──
function openShareModal(){
  const ri=rIdx(S.xp),rank=RANKS[ri];
  document.getElementById('shareRankIcon').textContent=rank.icon;
  document.getElementById('shareUsername').textContent=S.username;
  document.getElementById('shareStats').textContent=`${rank.name} · ${S.xp} XP · ${S.done} done · 🔥${S.streak} streak`;
  const url=`https://kudos13.github.io/questlist?u=${encodeURIComponent(S.username)}&xp=${S.xp}&rank=${encodeURIComponent(rank.name)}&done=${S.done}`;
  document.getElementById('shareUrl').textContent=url;
  show('shareModal');
}

function copyShareLink(){
  const url=document.getElementById('shareUrl').textContent;
  const btn=document.getElementById('copyBtn');
  if(navigator.share){
    navigator.share({title:'My QuestList Rank',text:`I'm a ${RANKS[rIdx(S.xp)].name} with ${S.xp} XP on QuestList!`,url});
  } else {
    navigator.clipboard.writeText(url).then(()=>{
      btn.textContent='✅ Copied!';
      setTimeout(()=>btn.textContent='📋 Copy Share Link',2000);
    }).catch(()=>{btn.textContent='✅ Link ready — long press to copy';});
  }
}

// ── FX ──
function spawnXP(e,xp){
  const p=document.createElement('div');
  p.className='xp-pop';p.textContent=`+${xp} XP`;
  p.style.cssText=`left:${(e.clientX||window.innerWidth/2)-30}px;top:${(e.clientY||window.innerHeight/2)-20}px`;
  document.body.appendChild(p);setTimeout(()=>p.remove(),1300);
}

function showLevelUp(ri){
  const r=RANKS[ri];
  document.getElementById('lvlIcon').textContent=r.icon;
  document.getElementById('lvlName').textContent=r.name;
  const b=document.getElementById('lvlBanner');
  b.classList.add('show');
  document.getElementById('rankBadge').classList.add('pop');
  setTimeout(()=>document.getElementById('rankBadge').classList.remove('pop'),600);
  setTimeout(()=>b.classList.remove('show'),3000);
}

// ── MODAL HELPERS ──
function show(id){
  document.getElementById(id).classList.add('show');
  document.getElementById('overlay').classList.add('show');
}

function closeAllModals(){
  document.querySelectorAll('.modal').forEach(m=>m.classList.remove('show'));
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('lvlBanner').classList.remove('show');
}

// ── NAV ──
function showScreen(s){
  ['Quests','Ranks'].forEach(n=>{
    document.getElementById('screen'+n).classList.toggle('active',s===(n==='Quests'?'quests':'ranks'));
    document.getElementById('nav'+(n==='Quests'?'Q':'R')).classList.toggle('active',s===(n==='Quests'?'quests':'ranks'));
  });
}

// ── UTILS ──
function x(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.getElementById('addBtn').addEventListener('click',addTask);
document.getElementById('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
document.getElementById('setupInput').addEventListener('keydown',e=>{if(e.key==='Enter')setupUser();});
</script>
</body>
</html>
