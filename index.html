<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QuestList">
<meta name="theme-color" content="#0a0a14">
<title>QuestList</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0a14; --s1: #12121e; --s2: #1a1a2c; --s3: #20203a;
  --br: rgba(100,120,255,0.14); --br2: rgba(100,120,255,0.28);
  --ac: #6070ff; --ac2: #a855f7;
  --gold: #fbbf24; --green: #10b981; --red: #f43f5e; --orange: #f97316;
  --tx: #e2e8ff; --m1: #4b5680; --m2: #7880a0;
  --st: env(safe-area-inset-top, 0px); --sb: env(safe-area-inset-bottom, 0px);
}
body { background: var(--bg); color: var(--tx); font-family: 'Exo 2', sans-serif; min-height: 100dvh; overflow-x: hidden; padding-bottom: calc(80px + var(--sb)); }
body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse 60% 40% at 10% 0%, rgba(96,112,255,0.08) 0%, transparent 50%), radial-gradient(ellipse 50% 35% at 90% 100%, rgba(168,85,247,0.07) 0%, transparent 50%); }
.app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; }

/* SCREENS */
.page { display: none; }
.page.show { display: block; }

/* SETUP */
#setupWrap { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 24px; }
.setup-card { background: var(--s1); border: 1px solid var(--br2); border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 360px; text-align: center; }
.setup-card .big-icon { font-size: 56px; margin-bottom: 16px; }
.setup-card h2 { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.setup-card p { font-size: 14px; color: var(--m2); line-height: 1.6; margin-bottom: 22px; }

/* HEADER */
.topbar { padding: calc(var(--st) + 18px) 16px 0; display: flex; align-items: center; justify-content: space-between; }
.brand { font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 4px; color: var(--ac); }
.topbar-right { display: flex; gap: 8px; }

/* RANK CARD */
.rank-card { margin: 14px 14px 0; background: var(--s1); border: 1px solid var(--br); border-radius: 22px; padding: 20px; position: relative; overflow: hidden; }
.rank-card::after { content: ''; position: absolute; top: -40px; right: -40px; width: 140px; height: 140px; background: radial-gradient(circle, rgba(96,112,255,0.18) 0%, transparent 65%); pointer-events: none; }
.rank-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.rank-icon { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--ac), var(--ac2)); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; box-shadow: 0 4px 20px rgba(96,112,255,0.4); }
.rank-icon.pop { animation: rankpop 0.5s cubic-bezier(.34,1.56,.64,1); }
@keyframes rankpop { 0%{transform:scale(1)} 50%{transform:scale(1.3) rotate(-8deg)} 100%{transform:scale(1)} }
.rank-info { flex: 1; }
.rank-title { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; }
.rank-sub { font-size: 11px; color: var(--m1); letter-spacing: 1.5px; margin-top: 3px; }
.xp-right { text-align: right; }
.xp-now { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; color: var(--gold); line-height: 1; }
.xp-of { font-size: 11px; color: var(--m1); }
.xp-bar { height: 10px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
.xp-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--ac), var(--ac2)); box-shadow: 0 0 12px rgba(96,112,255,0.5); transition: width 0.8s cubic-bezier(.34,1.2,.64,1); }

/* STAT PILLS */
.stat-row { display: flex; gap: 8px; margin: 10px 14px 0; }
.stat-box { flex: 1; background: var(--s1); border: 1px solid var(--br); border-radius: 14px; padding: 12px 8px; text-align: center; }
.stat-num { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; }
.stat-num.green { color: var(--green); }
.stat-num.red { color: var(--red); }
.stat-num.blue { color: var(--ac); }
.stat-lbl { font-size: 9px; color: var(--m1); letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }

/* OVERDUE ALERT */
.od-alert { margin: 10px 14px 0; background: rgba(244,63,94,0.08); border: 1px solid rgba(244,63,94,0.3); border-radius: 14px; padding: 10px 14px; align-items: center; gap: 8px; display: none; }
.od-alert.show { display: flex; }
.od-msg { flex: 1; font-size: 13px; color: var(--red); font-weight: 500; }

/* ADD PANEL */
.add-box { margin: 12px 14px 0; background: var(--s1); border: 1px solid var(--br); border-radius: 18px; padding: 14px; }
.add-row { display: flex; gap: 8px; margin-bottom: 10px; }
.add-row:last-child { margin-bottom: 0; }

/* FORM ELEMENTS */
.field { background: var(--s2); border: 1px solid var(--br); border-radius: 12px; color: var(--tx); font-family: 'Exo 2', sans-serif; outline: none; transition: border-color 0.2s; }
.field:focus { border-color: rgba(96,112,255,0.55); }
#taskText { flex: 1; padding: 12px 14px; font-size: 15px; }
#taskText::placeholder { color: var(--m1); }
#xpPick { flex: 1; padding: 11px 8px; font-size: 14px; color: var(--gold); font-family: 'Rajdhani', sans-serif; font-weight: 600; -webkit-appearance: none; cursor: pointer; }
#grpPick { flex: 1; padding: 11px 8px; font-size: 13px; -webkit-appearance: none; cursor: pointer; }
#duePick { flex: 1; padding: 11px 8px; font-size: 12px; -webkit-appearance: none; }
#duePick::-webkit-calendar-picker-indicator { filter: invert(0.5) brightness(1.2); }

/* BUTTONS */
.btn-primary { background: linear-gradient(135deg, var(--ac), var(--ac2)); border: none; border-radius: 12px; color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.15s; }
.btn-primary:active { transform: scale(0.94); }
.btn-ghost { background: var(--s2); border: 1px solid var(--br); border-radius: 12px; color: var(--m2); font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.btn-ghost:active { background: var(--s3); }
.btn-icon { background: var(--s1); border: 1px solid var(--br); border-radius: 11px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
.btn-icon:active { background: var(--s2); }
#addTaskBtn { width: 50px; font-size: 26px; padding: 0; }
.full-btn { width: 100%; padding: 14px; border-radius: 14px; letter-spacing: 1px; margin-bottom: 8px; }
.full-btn:last-child { margin-bottom: 0; }

/* FILTER TABS */
.filter-bar { display: flex; gap: 6px; padding: 12px 14px 0; }
.ftab { background: var(--s1); border: 1px solid var(--br); border-radius: 99px; padding: 7px 18px; font-size: 12px; font-weight: 500; color: var(--m2); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.ftab.active { background: linear-gradient(135deg, var(--ac), var(--ac2)); border-color: transparent; color: #fff; }

/* GROUP CHIPS */
.grp-bar { display: flex; gap: 6px; padding: 10px 14px 0; overflow-x: auto; scrollbar-width: none; }
.grp-bar::-webkit-scrollbar { display: none; }
.grp-chip { background: var(--s1); border: 1px solid var(--br); border-radius: 99px; padding: 6px 13px; font-size: 12px; color: var(--m2); cursor: pointer; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.grp-chip.active { background: linear-gradient(135deg, var(--ac), var(--ac2)); border-color: transparent; color: #fff; }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; }

/* SECTION HEADER */
.sec-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 14px 6px; }
.sec-lbl { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--m1); }
.sec-cnt { font-family: 'Rajdhani', sans-serif; font-size: 12px; color: var(--m1); }

/* TASK LIST */
.task-list { padding: 0 14px; display: flex; flex-direction: column; gap: 8px; }
.task { background: var(--s1); border: 1px solid var(--br); border-radius: 16px; padding: 13px 12px 13px 14px; display: flex; align-items: center; gap: 11px; cursor: pointer; position: relative; overflow: hidden; animation: taskin 0.28s cubic-bezier(.34,1.2,.64,1) both; transition: opacity 0.2s, border-color 0.2s; }
@keyframes taskin { from { opacity: 0; transform: translateY(8px) scale(0.97); } to { opacity: 1; transform: none; } }
.task:active { opacity: 0.75; }
.task.is-done { opacity: 0.42; }
.task.is-done .task-text { text-decoration: line-through; color: var(--m1); }
.task.is-overdue { border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.04); }
.task.is-soon { border-color: rgba(249,115,22,0.4); background: rgba(249,115,22,0.04); }
.task::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; background: var(--stripe, transparent); }
.check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--br2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: transparent; transition: all 0.22s; }
.task.is-done .check { background: var(--green); border-color: var(--green); color: #000; }
.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 15px; font-weight: 500; line-height: 1.35; word-break: break-word; }
.task-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; align-items: center; }
.xp-tag { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; color: var(--gold); background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.22); padding: 2px 8px; border-radius: 99px; }
.grp-tag { font-size: 10px; padding: 2px 8px; border-radius: 99px; border: 1px solid; }
.time-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
.time-tag.ok { color: var(--m2); background: var(--s2); border: 1px solid var(--br); }
.time-tag.warn { color: var(--orange); background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.3); }
.time-tag.late { color: var(--red); background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.3); animation: blink 1.2s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
.undo-hint { font-size: 10px; color: var(--m1); font-style: italic; }
.del-btn { background: none; border: none; color: var(--m1); font-size: 17px; cursor: pointer; padding: 6px; border-radius: 8px; line-height: 1; flex-shrink: 0; }
.del-btn:active { background: rgba(244,63,94,0.12); color: var(--red); }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 50px 24px; }
.empty-state .ei { font-size: 46px; opacity: 0.28; margin-bottom: 12px; }
.empty-state .et { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 600; opacity: 0.28; }
.empty-state .es { font-size: 12px; color: var(--m1); margin-top: 5px; }

/* OVERLAY + MODAL */
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(5px); z-index: 200; display: none; }
#overlay.show { display: block; }
.modal { position: fixed; bottom: 0; left: 0; right: 0; z-index: 300; background: var(--s1); border-top: 1px solid var(--br2); border-radius: 24px 24px 0 0; padding: 20px 18px calc(var(--sb) + 22px); max-height: 88dvh; overflow-y: auto; display: none; transform: translateY(100%); transition: transform 0.32s cubic-bezier(.34,1.1,.64,1); }
.modal.show { display: block; transform: translateY(0); }
.modal-handle { width: 38px; height: 4px; border-radius: 99px; background: var(--m1); margin: 0 auto 18px; opacity: 0.4; }
.modal-title { font-family: 'Rajdhani', sans-serif; font-size: 19px; font-weight: 700; margin-bottom: 14px; }
.modal-input { width: 100%; background: var(--s2); border: 1px solid var(--br); border-radius: 12px; padding: 12px 14px; color: var(--tx); font-family: 'Exo 2', sans-serif; font-size: 15px; outline: none; margin-bottom: 10px; }
.modal-input:focus { border-color: rgba(96,112,255,0.5); }

/* COLOR PICKER */
.color-row { display: flex; gap: 9px; flex-wrap: wrap; margin-bottom: 12px; }
.col-swatch { width: 30px; height: 30px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 0.18s, border-color 0.18s; }
.col-swatch.picked { border-color: #fff; transform: scale(1.15); }

/* GROUP ROWS IN MODAL */
.grp-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.grp-row { display: flex; align-items: center; gap: 10px; background: var(--s2); border: 1px solid var(--br); border-radius: 12px; padding: 11px 13px; }
.grp-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.grp-name { flex: 1; font-size: 14px; font-weight: 500; }
.grp-del { background: none; border: none; color: var(--m1); font-size: 17px; cursor: pointer; padding: 2px 6px; }
.grp-del:active { color: var(--red); }

/* SHARE CARD */
.share-preview { background: linear-gradient(135deg, var(--s2), var(--s3)); border: 1px solid var(--br2); border-radius: 18px; padding: 20px; margin-bottom: 14px; text-align: center; }
.share-preview .sp-icon { font-size: 40px; margin-bottom: 8px; }
.share-preview .sp-name { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; }
.share-preview .sp-stats { font-size: 13px; color: var(--m2); margin-top: 5px; }
.share-url { background: var(--s2); border: 1px solid var(--br); border-radius: 10px; padding: 10px 12px; font-size: 11px; color: var(--m2); word-break: break-all; margin-bottom: 12px; font-family: monospace; line-height: 1.5; }

/* XP FLOAT */
.xp-float { position: fixed; z-index: 9999; pointer-events: none; font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); text-shadow: 0 0 16px rgba(251,191,36,0.7); animation: xpgo 1.1s ease forwards; }
@keyframes xpgo { 0%{opacity:0;transform:translateY(0) scale(0.7)} 18%{opacity:1;transform:translateY(-14px) scale(1.1)} 78%{opacity:1;transform:translateY(-56px)} 100%{opacity:0;transform:translateY(-84px) scale(0.9)} }

/* RANK UP TOAST */
.rankup-toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.7); background: linear-gradient(135deg, var(--ac), var(--ac2)); border-radius: 24px; padding: 30px 44px; text-align: center; z-index: 600; opacity: 0; pointer-events: none; transition: all 0.38s cubic-bezier(.34,1.4,.64,1); box-shadow: 0 20px 60px rgba(96,112,255,0.5); }
.rankup-toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
.ru-icon { font-size: 50px; margin-bottom: 8px; }
.ru-lbl { font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 4px; opacity: 0.8; }
.ru-name { font-family: 'Rajdhani', sans-serif; font-size: 30px; font-weight: 700; }

/* BOTTOM NAV */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; padding: 8px 20px calc(var(--sb) + 8px); background: rgba(10,10,20,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--br); display: flex; justify-content: space-around; z-index: 100; }
.nav-item { background: none; border: none; color: var(--m1); font-family: 'Exo 2', sans-serif; font-size: 9px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 5px 16px; border-radius: 12px; transition: color 0.2s; }
.nav-item.active { color: var(--ac); }
.nav-item .ni { font-size: 20px; }

/* RANK LADDER PAGE */
.ladder-head { padding: calc(var(--st) + 18px) 14px 0; text-align: center; }
.ladder-head h3 { font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--ac); margin-bottom: 14px; }
.ladder { padding: 0 14px; display: flex; flex-direction: column; gap: 8px; }
.lrow { background: var(--s1); border: 1px solid var(--br); border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.lrow.cur { border-color: var(--ac); box-shadow: 0 0 0 1px rgba(96,112,255,0.18), 0 4px 20px rgba(96,112,255,0.12); }
.lrow.past { opacity: 0.5; }
.lrow-icon { font-size: 26px; width: 38px; text-align: center; }
.lrow-info { flex: 1; }
.lrow-name { font-family: 'Rajdhani', sans-serif; font-size: 17px; font-weight: 600; }
.lrow-xp { font-size: 11px; color: var(--m1); }
.you-badge { font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; background: linear-gradient(135deg,var(--ac),var(--ac2)); color:#fff; padding: 3px 10px; border-radius: 99px; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setupWrap">
  <div class="setup-card">
    <div class="big-icon">⚔️</div>
    <h2>Welcome to QuestList</h2>
    <p>Enter your adventurer name to get started. It shows on your rank card and share link.</p>
    <input class="modal-input" id="setupNameInput" placeholder="Your name (e.g. Kudos13)" maxlength="22" style="text-align:center">
    <button class="btn-primary full-btn" id="startBtn">Begin Quest</button>
  </div>
</div>

<!-- OVERLAY (closes modals) -->
<div id="overlay"></div>

<!-- RANK UP TOAST -->
<div class="rankup-toast" id="rankupToast">
  <div class="ru-icon" id="ruIcon">🥉</div>
  <div class="ru-lbl">Rank Up!</div>
  <div class="ru-name" id="ruName">—</div>
</div>

<!-- GROUPS MODAL -->
<div class="modal" id="groupsModal">
  <div class="modal-handle"></div>
  <div class="modal-title">Manage Groups</div>
  <div class="grp-list" id="grpList"></div>
  <input class="modal-input" id="newGrpName" placeholder="Group name…" maxlength="24">
  <div class="color-row" id="colorPicker"></div>
  <button class="btn-primary full-btn" id="saveGrpBtn">Add Group</button>
  <button class="btn-ghost full-btn" id="closeGrpBtn">Done</button>
</div>

<!-- SHARE MODAL -->
<div class="modal" id="shareModal">
  <div class="modal-handle"></div>
  <div class="modal-title">Share Your Progress</div>
  <div class="share-preview">
    <div class="sp-icon" id="spIcon">🥉</div>
    <div class="sp-name" id="spName">—</div>
    <div class="sp-stats" id="spStats">—</div>
  </div>
  <div class="share-url" id="shareUrlBox"></div>
  <button class="btn-primary full-btn" id="copyLinkBtn">📋 Copy Share Link</button>
  <button class="btn-ghost full-btn" id="closeShareBtn">Close</button>
</div>

<!-- MAIN APP -->
<div class="app">

  <!-- QUESTS PAGE -->
  <div class="page show" id="pageQuests">

    <div class="topbar">
      <div class="brand">⚡ QuestList</div>
      <div class="topbar-right">
        <button class="btn-icon" id="openGroupsBtn">🗂</button>
        <button class="btn-icon" id="openShareBtn">📤</button>
      </div>
    </div>

    <div class="rank-card">
      <div class="rank-top">
        <div class="rank-icon" id="rankIcon">🥉</div>
        <div class="rank-info">
          <div class="rank-title" id="rankTitle">Bronze Squire</div>
          <div class="rank-sub" id="rankSub">RANK I</div>
        </div>
        <div class="xp-right">
          <div class="xp-now"><span id="xpNow">0</span> XP</div>
          <div class="xp-of">/ <span id="xpOf">150</span></div>
        </div>
      </div>
      <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    </div>

    <div class="stat-row">
      <div class="stat-box"><div class="stat-num green" id="stDone">0</div><div class="stat-lbl">Done</div></div>
      <div class="stat-box"><div class="stat-num red" id="stStreak">🔥0</div><div class="stat-lbl">Streak</div></div>
      <div class="stat-box"><div class="stat-num blue" id="stXP">0</div><div class="stat-lbl">Total XP</div></div>
    </div>

    <div class="od-alert" id="odAlert">
      <span>⚠️</span>
      <div class="od-msg" id="odMsg">Overdue quests!</div>
    </div>

    <div class="add-box">
      <div class="add-row">
        <input type="text" class="field" id="taskText" placeholder="Add a new quest…" maxlength="80">
        <button class="btn-primary btn-icon" id="addTaskBtn">+</button>
      </div>
      <div class="add-row">
        <select class="field" id="xpPick">
          <option value="25">⚡ 25 XP</option>
          <option value="50" selected>⭐ 50 XP</option>
          <option value="100">💎 100 XP</option>
          <option value="200">🏆 200 XP</option>
        </select>
        <select class="field" id="grpPick">
          <option value="">No group</option>
        </select>
        <input type="datetime-local" class="field" id="duePick">
      </div>
    </div>

    <div class="filter-bar">
      <button class="ftab active" id="ftActive">Active</button>
      <button class="ftab" id="ftAll">All</button>
      <button class="ftab" id="ftDone">Done</button>
    </div>

    <div class="grp-bar" id="grpBar"></div>

    <div class="sec-head">
      <div class="sec-lbl" id="secLbl">ACTIVE QUESTS</div>
      <div class="sec-cnt" id="secCnt"></div>
    </div>
    <div class="task-list" id="taskList"></div>
    <div style="height:12px"></div>
  </div>

  <!-- RANKS PAGE -->
  <div class="page" id="pageRanks">
    <div class="ladder-head"><h3>🏆 Rank Ladder</h3></div>
    <div class="ladder" id="ladder"></div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-item active" id="navQuests"><span class="ni">⚔️</span>Quests</button>
  <button class="nav-item" id="navRanks"><span class="ni">🏆</span>Ranks</button>
</nav>

<script>
/* ============================================================
   QUESTLIST — all logic
   ============================================================ */

var RANKS = [
  { name:'Bronze Squire',    icon:'🥉', xp:0,    sub:'RANK I' },
  { name:'Iron Warrior',     icon:'⚔️',  xp:150,  sub:'RANK II' },
  { name:'Silver Knight',    icon:'🛡️',  xp:400,  sub:'RANK III' },
  { name:'Gold Guardian',    icon:'🥇',  xp:800,  sub:'RANK IV' },
  { name:'Platinum Paladin', icon:'💫',  xp:1500, sub:'RANK V' },
  { name:'Diamond Legend',   icon:'💎',  xp:2500, sub:'RANK VI' },
  { name:'Mythic Champion',  icon:'🔥',  xp:4000, sub:'RANK VII' },
  { name:'Eternal Sovereign',icon:'👑',  xp:6000, sub:'RANK VIII' }
];

var SWATCHES = ['#6070ff','#a855f7','#10b981','#f43f5e','#f97316','#fbbf24','#06b6d4','#ec4899'];

/* ---- state ---- */
var pickedColor = SWATCHES[0];
var currentFilter = 'active';
var currentGrp = 'all';

function defaultState() {
  return { username:'', tasks:[], groups:[], xp:0, totalXP:0, done:0, streak:0, lastDate:null, lastResetDate:null };
}

var S = (function() {
  try { var d = JSON.parse(localStorage.getItem('qlv5')); return d || defaultState(); }
  catch(e) { return defaultState(); }
})();

function persist() { try { localStorage.setItem('qlv5', JSON.stringify(S)); } catch(e){} }

function rIdx() {
  var i = RANKS.length - 1;
  while (i > 0 && S.xp < RANKS[i].xp) i--;
  return i;
}

/* ---- daily reset ---- */
function dailyReset() {
  var today = new Date().toDateString();
  if (S.lastResetDate === today) return; // already reset today
  S.lastResetDate = today;
  // remove all tasks (completed and active) — keep XP, rank, streak, groups
  S.tasks = [];
  persist();
}

/* ---- schedule next midnight reset ---- */
function scheduleReset() {
  var now = new Date();
  var midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0);
  var msUntilMidnight = midnight - now;
  setTimeout(function() {
    dailyReset();
    redraw();
    scheduleReset(); // schedule the next one
  }, msUntilMidnight);
}

/* ---- boot ---- */
(function boot() {
  buildSwatches();
  dailyReset(); // run on load in case they open app after midnight

  if (!S.username) {
    show('setupWrap');
  } else {
    hide('setupWrap');
    redraw();
  }

  /* setup form */
  get('startBtn').onclick = function() {
    var v = get('setupNameInput').value.trim();
    if (!v) { get('setupNameInput').focus(); return; }
    S.username = v;
    persist();
    hide('setupWrap');
    redraw();
  };
  get('setupNameInput').onkeydown = function(e) { if (e.key === 'Enter') get('startBtn').click(); };

  /* add task */
  get('addTaskBtn').onclick = doAddTask;
  get('taskText').onkeydown = function(e) { if (e.key === 'Enter') doAddTask(); };

  /* filter tabs */
  get('ftActive').onclick = function() { setFilter('active'); };
  get('ftAll').onclick    = function() { setFilter('all'); };
  get('ftDone').onclick   = function() { setFilter('done'); };

  /* groups modal */
  get('openGroupsBtn').onclick = openGroupsModal;
  get('saveGrpBtn').onclick    = doAddGroup;
  get('closeGrpBtn').onclick   = closeModals;
  get('newGrpName').onkeydown  = function(e) { if (e.key === 'Enter') doAddGroup(); };

  /* share modal */
  get('openShareBtn').onclick  = openShareModal;
  get('copyLinkBtn').onclick   = doCopy;
  get('closeShareBtn').onclick = closeModals;

  /* overlay */
  get('overlay').onclick = closeModals;

  /* nav */
  get('navQuests').onclick = function() { switchPage('pageQuests', 'navQuests'); };
  get('navRanks').onclick  = function() { switchPage('pageRanks',  'navRanks');  buildLadder(); };

  /* timer refresh */
  setInterval(function() { drawTasks(); checkOverdue(); }, 30000);

  /* schedule midnight reset */
  scheduleReset();
})();

/* ---- helpers ---- */
function get(id) { return document.getElementById(id); }
function show(id) { get(id).style.display = ''; }
function hide(id) { get(id).style.display = 'none'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ---- full redraw ---- */
function redraw() {
  drawRankCard();
  drawStats();
  drawGrpBar();
  drawGrpSelect();
  drawTasks();
  checkOverdue();
}

/* ---- rank card ---- */
function drawRankCard() {
  var i = rIdx(), r = RANKS[i], n = RANKS[i+1];
  var pct = n ? Math.round((S.xp - r.xp) / (n.xp - r.xp) * 100) : 100;
  get('rankIcon').textContent  = r.icon;
  get('rankTitle').textContent = r.name;
  get('rankSub').textContent   = r.sub + (S.username ? ' · ' + S.username : '');
  get('xpNow').textContent     = S.xp;
  get('xpOf').textContent      = n ? n.xp : '∞';
  get('xpFill').style.width    = Math.min(Math.max(pct, 0), 100) + '%';
}

/* ---- stats ---- */
function drawStats() {
  get('stDone').textContent   = S.done;
  get('stStreak').textContent = '🔥' + S.streak;
  get('stXP').textContent     = S.totalXP;
}

/* ---- group chips in bar ---- */
function drawGrpBar() {
  var html = '';
  html += '<button class="grp-chip' + (currentGrp==='all'?' active':'') + '" onclick="setGrp(\'all\')">All</button>';
  html += '<button class="grp-chip' + (currentGrp==='none'?' active':'') + '" onclick="setGrp(\'none\')">Ungrouped</button>';
  for (var i = 0; i < S.groups.length; i++) {
    var g = S.groups[i];
    html += '<button class="grp-chip' + (currentGrp===g.id?' active':'') + '" onclick="setGrp(\'' + g.id + '\')">' +
            '<span class="chip-dot" style="background:' + g.color + '"></span>' + esc(g.name) + '</button>';
  }
  get('grpBar').innerHTML = html;
}

/* ---- group dropdown in add panel ---- */
function drawGrpSelect() {
  var cur = get('grpPick').value;
  var html = '<option value="">No group</option>';
  for (var i = 0; i < S.groups.length; i++) {
    html += '<option value="' + S.groups[i].id + '">' + esc(S.groups[i].name) + '</option>';
  }
  get('grpPick').innerHTML = html;
  get('grpPick').value = cur;
}

/* ---- task list ---- */
function drawTasks() {
  var tasks = S.tasks.slice();

  if (currentFilter === 'active') tasks = tasks.filter(function(t){ return !t.done; });
  else if (currentFilter === 'done') tasks = tasks.filter(function(t){ return t.done; });

  if (currentGrp === 'none') tasks = tasks.filter(function(t){ return !t.groupId; });
  else if (currentGrp !== 'all') tasks = tasks.filter(function(t){ return t.groupId === currentGrp; });

  tasks.sort(function(a, b) {
    var ao = isOverdue(a), bo = isOverdue(b);
    if (ao && !bo) return -1;
    if (!ao && bo) return 1;
    if (a.due && b.due) return new Date(a.due) - new Date(b.due);
    if (a.due) return -1;
    if (b.due) return 1;
    return Number(b.id) - Number(a.id);
  });

  var lblMap = { active:'ACTIVE QUESTS', done:'COMPLETED QUESTS', all:'ALL QUESTS' };
  get('secLbl').textContent = lblMap[currentFilter] || 'QUESTS';
  get('secCnt').textContent = tasks.length ? String(tasks.length) : '';

  if (!tasks.length) {
    get('taskList').innerHTML =
      '<div class="empty-state">' +
      '<div class="ei">' + (currentFilter === 'done' ? '🏆' : '⚔️') + '</div>' +
      '<div class="et">' + (currentFilter === 'done' ? 'No completed quests yet' : 'No active quests') + '</div>' +
      '<div class="es">' + (currentFilter === 'done' ? 'Complete quests to see them here' : 'Add a quest above to begin') + '</div>' +
      '</div>';
    return;
  }

  var html = '';
  for (var j = 0; j < tasks.length; j++) {
    var t = tasks[j];
    var stripe = t.xp >= 200 ? '#a855f7' : t.xp >= 100 ? '#fbbf24' : t.xp >= 50 ? '#6070ff' : '#4b5680';
    var g = null;
    for (var k = 0; k < S.groups.length; k++) {
      if (S.groups[k].id === t.groupId) { g = S.groups[k]; break; }
    }
    var cls = 'task';
    if (t.done) cls += ' is-done';
    else if (isOverdue(t)) cls += ' is-overdue';
    else if (isDueSoon(t)) cls += ' is-soon';

    var timerHtml = (t.due && !t.done) ? makeTimerTag(t.due) : '';
    var grpHtml   = g ? '<span class="grp-tag" style="color:' + g.color + ';border-color:' + g.color + '44;background:' + g.color + '11">' + esc(g.name) + '</span>' : '';
    var undoHtml  = t.done ? '<span class="undo-hint">tap to uncheck</span>' : '';

    html += '<div class="' + cls + '" style="--stripe:' + stripe + '" data-id="' + t.id + '">' +
      '<div class="check">✓</div>' +
      '<div class="task-body">' +
        '<div class="task-text">' + esc(t.text) + '</div>' +
        '<div class="task-meta">' +
          '<span class="xp-tag">+' + t.xp + ' XP</span>' +
          grpHtml + timerHtml + undoHtml +
        '</div>' +
      '</div>' +
      '<button class="del-btn" data-del="' + t.id + '">🗑</button>' +
    '</div>';
  }
  get('taskList').innerHTML = html;

  /* attach events via delegation */
  get('taskList').onclick = function(e) {
    /* delete button */
    var delTarget = e.target.closest ? e.target.closest('[data-del]') : (e.target.getAttribute('data-del') ? e.target : null);
    if (delTarget) { e.stopPropagation(); doDeleteTask(delTarget.getAttribute('data-del')); return; }
    /* toggle */
    var row = e.target.closest ? e.target.closest('[data-id]') : null;
    if (row) doToggleTask(row.getAttribute('data-id'), e);
  };
}

function makeTimerTag(due) {
  var diff = new Date(due) - Date.now();
  var abs  = Math.abs(diff);
  var mins = Math.floor(abs / 60000), hrs = Math.floor(mins / 60), days = Math.floor(hrs / 24);
  var label = days > 0 ? (days + 'd ' + (hrs % 24) + 'h') : hrs > 0 ? (hrs + 'h ' + (mins % 60) + 'm') : (mins + 'm');
  if (diff < 0)       return '<span class="time-tag late">⚠️ ' + label + ' overdue</span>';
  if (diff < 3600000) return '<span class="time-tag warn">⏱ ' + label + '</span>';
  return '<span class="time-tag ok">🕐 ' + label + '</span>';
}

function isOverdue(t) { return !!(t.due && !t.done && new Date(t.due) < Date.now()); }
function isDueSoon(t) { var d = new Date(t.due) - Date.now(); return !!(t.due && !t.done && d > 0 && d < 3600000); }

function checkOverdue() {
  var od = S.tasks.filter(isOverdue);
  if (od.length) {
    get('odAlert').classList.add('show');
    get('odMsg').textContent = od.length + ' overdue quest' + (od.length > 1 ? 's' : '') + ' — complete ' + (od.length > 1 ? 'them' : 'it') + ' now!';
  } else {
    get('odAlert').classList.remove('show');
  }
}

/* ---- actions ---- */
function doAddTask() {
  var inp = get('taskText');
  var txt = inp.value.trim();
  if (!txt) { inp.focus(); return; }
  var xp  = parseInt(get('xpPick').value, 10) || 50;
  var grp = get('grpPick').value || null;
  var due = get('duePick').value || null;
  S.tasks.unshift({ id: String(Date.now()), text: txt, xp: xp, done: false, groupId: grp, due: due });
  inp.value = '';
  get('duePick').value = '';
  persist();
  redraw();
}

function doToggleTask(id, e) {
  var t = null;
  for (var i = 0; i < S.tasks.length; i++) { if (S.tasks[i].id === id) { t = S.tasks[i]; break; } }
  if (!t) return;

  if (t.done) {
    // Uncheck — move back to active but keep all XP earned
    t.done = false;
    persist(); redraw(); return;
  }

  var prev = rIdx();
  t.done    = true;
  S.xp      += t.xp;
  S.totalXP += t.xp;
  S.done    += 1;
  bumpStreak();
  persist();
  var next = rIdx();
  if (next > prev) showRankUp(next);
  floatXP(e, t.xp);
  redraw();
}

function doDeleteTask(id) {
  S.tasks = S.tasks.filter(function(x) { return x.id !== id; });
  persist(); redraw();
}

function bumpStreak() {
  var today = new Date().toDateString();
  if (S.lastDate === today) return;
  var yest = new Date(Date.now() - 86400000).toDateString();
  S.streak  = (S.lastDate === yest) ? S.streak + 1 : 1;
  S.lastDate = today;
}

function setFilter(f) {
  currentFilter = f;
  get('ftActive').classList.toggle('active', f === 'active');
  get('ftAll').classList.toggle('active',    f === 'all');
  get('ftDone').classList.toggle('active',   f === 'done');
  drawTasks();
}

function setGrp(v) { currentGrp = v; drawGrpBar(); drawTasks(); }

/* ---- groups modal ---- */
function openGroupsModal() {
  renderGrpList();
  get('groupsModal').classList.add('show');
  get('overlay').classList.add('show');
  setTimeout(function() { get('groupsModal').style.display = 'block'; }, 0);
  get('groupsModal').classList.add('show');
}

function renderGrpList() {
  if (!S.groups.length) {
    get('grpList').innerHTML = '<p style="text-align:center;color:var(--m1);font-size:13px;padding:6px 0">No groups yet — add one below</p>';
    return;
  }
  var html = '';
  for (var i = 0; i < S.groups.length; i++) {
    var g = S.groups[i];
    html += '<div class="grp-row">' +
      '<div class="grp-dot" style="background:' + g.color + '"></div>' +
      '<div class="grp-name">' + esc(g.name) + '</div>' +
      '<button class="grp-del" onclick="doDeleteGroup(\'' + g.id + '\')">✕</button>' +
    '</div>';
  }
  get('grpList').innerHTML = html;
}

function buildSwatches() {
  var html = '';
  for (var i = 0; i < SWATCHES.length; i++) {
    html += '<div class="col-swatch' + (i === 0 ? ' picked' : '') + '" style="background:' + SWATCHES[i] + '" data-c="' + SWATCHES[i] + '"></div>';
  }
  get('colorPicker').innerHTML = html;
  get('colorPicker').onclick = function(e) {
    var sw = e.target.closest ? e.target.closest('.col-swatch') : (e.target.classList.contains('col-swatch') ? e.target : null);
    if (!sw) return;
    pickedColor = sw.getAttribute('data-c');
    var all = document.querySelectorAll('.col-swatch');
    for (var i = 0; i < all.length; i++) all[i].classList.remove('picked');
    sw.classList.add('picked');
  };
}

function doAddGroup() {
  var name = get('newGrpName').value.trim();
  if (!name) { get('newGrpName').focus(); return; }
  S.groups.push({ id: String(Date.now()), name: name, color: pickedColor });
  get('newGrpName').value = '';
  persist();
  redraw();
  renderGrpList();
}

function doDeleteGroup(id) {
  S.groups = S.groups.filter(function(g) { return g.id !== id; });
  for (var i = 0; i < S.tasks.length; i++) {
    if (S.tasks[i].groupId === id) S.tasks[i].groupId = null;
  }
  if (currentGrp === id) currentGrp = 'all';
  persist(); redraw(); renderGrpList();
}

/* ---- share modal ---- */
function openShareModal() {
  var i = rIdx(), r = RANKS[i];
  get('spIcon').textContent  = r.icon;
  get('spName').textContent  = S.username || 'Adventurer';
  get('spStats').textContent = r.name + ' · ' + S.xp + ' XP · ' + S.done + ' done · 🔥' + S.streak;
  var url = 'https://kudos13.github.io/questlist?u=' + encodeURIComponent(S.username || '') +
            '&xp=' + S.xp + '&rank=' + encodeURIComponent(r.name) + '&done=' + S.done;
  get('shareUrlBox').textContent = url;
  get('shareModal').classList.add('show');
  get('overlay').classList.add('show');
}

function doCopy() {
  var url = get('shareUrlBox').textContent;
  var btn = get('copyLinkBtn');
  if (navigator.share) {
    navigator.share({ title: 'My QuestList', text: 'I am ' + RANKS[rIdx()].name + ' with ' + S.xp + ' XP!', url: url });
    return;
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(function() {
      btn.textContent = '✅ Copied!';
      setTimeout(function() { btn.textContent = '📋 Copy Share Link'; }, 2200);
    }).catch(function() {
      btn.textContent = '✅ See URL above';
      setTimeout(function() { btn.textContent = '📋 Copy Share Link'; }, 2200);
    });
  } else {
    btn.textContent = '✅ See URL above — copy it';
    setTimeout(function() { btn.textContent = '📋 Copy Share Link'; }, 2200);
  }
}

/* ---- modals ---- */
function closeModals() {
  get('groupsModal').classList.remove('show');
  get('shareModal').classList.remove('show');
  get('overlay').classList.remove('show');
  get('rankupToast').classList.remove('show');
}

/* ---- nav ---- */
function switchPage(pageId, navId) {
  var pages = ['pageQuests', 'pageRanks'];
  var navs  = ['navQuests',  'navRanks'];
  for (var i = 0; i < pages.length; i++) {
    get(pages[i]).classList.toggle('show', pages[i] === pageId);
    get(navs[i]).classList.toggle('active', navs[i] === navId);
  }
}

/* ---- rank ladder ---- */
function buildLadder() {
  var cur = rIdx();
  var html = '';
  for (var i = 0; i < RANKS.length; i++) {
    var r = RANKS[i];
    var isCur  = (i === cur);
    var isPast = (S.xp >= r.xp && !isCur);
    html += '<div class="lrow' + (isCur ? ' cur' : isPast ? ' past' : '') + '">' +
      '<div class="lrow-icon">' + r.icon + '</div>' +
      '<div class="lrow-info">' +
        '<div class="lrow-name">' + r.name + '</div>' +
        '<div class="lrow-xp">' + r.xp.toLocaleString() + ' XP required</div>' +
      '</div>' +
      '<div>' + (isCur ? '<span class="you-badge">YOU</span>' : isPast ? '<span style="color:var(--green);font-size:18px">✓</span>' : '<span style="color:var(--m1)">🔒</span>') + '</div>' +
    '</div>';
  }
  get('ladder').innerHTML = html;
}

/* ---- fx ---- */
function floatXP(e, xp) {
  var el = document.createElement('div');
  el.className   = 'xp-float';
  el.textContent = '+' + xp + ' XP';
  el.style.left  = ((e && e.clientX ? e.clientX : window.innerWidth  / 2) - 30) + 'px';
  el.style.top   = ((e && e.clientY ? e.clientY : window.innerHeight / 2) - 20) + 'px';
  document.body.appendChild(el);
  setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 1300);
}

function showRankUp(i) {
  var r = RANKS[i];
  get('ruIcon').textContent = r.icon;
  get('ruName').textContent = r.name;
  var t = get('rankupToast');
  t.classList.add('show');
  var ri = get('rankIcon');
  ri.classList.add('pop');
  setTimeout(function() { ri.classList.remove('pop'); }, 600);
  setTimeout(function() { t.classList.remove('show'); }, 3200);
}
</script>
</body>
</html>
